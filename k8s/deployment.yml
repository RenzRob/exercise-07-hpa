apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-registry
  labels:
    app: node-registry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-registry
  template:
    metadata:
      labels:
        app: node-registry
    spec:
      containers:
        - name: node-registry
          image: node-registry:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: DATABASE_URL
              value: "postgresql://noderegistry:noderegistry@db:5432/noderegistry"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5